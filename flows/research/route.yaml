route_id: "research_public_phase_c_route"
flow_id: "research"
route_version: "1.0.0-phase-c-starter"
source_basis:
  - "docs/workflow_overview.md"
  - "docs/workflow_map.md"
lifecycle_stages:
  - stage_id: "intake"
    label: "Problem intake"
    intent: "Receive and frame the incoming research problem."
  - stage_id: "question"
    label: "Question formalization"
    intent: "Turn the problem into a bounded research question."
  - stage_id: "readiness"
    label: "Knowledge readiness"
    intent: "Determine whether the workflow can move forward lawfully."
  - stage_id: "route_lock"
    label: "Route design and lock"
    intent: "Design the route and lock the bounded movement path."
  - stage_id: "data_resolution"
    label: "Data resolution"
    intent: "Resolve dependencies and route-bound materials."
  - stage_id: "build"
    label: "Build"
    intent: "Assemble the route-bound package."
  - stage_id: "freeze"
    label: "Envelope freeze"
    intent: "Freeze the execution envelope before pilot movement."
  - stage_id: "pilot"
    label: "Pilot"
    intent: "Run pilot and disposition review."
  - stage_id: "disposition"
    label: "Route disposition"
    intent: "Continue, redesign, stop, or successor-spawn under typed rules."
  - stage_id: "analysis"
    label: "Full analysis"
    intent: "Proceed only under explicit lawful continuation conditions."
  - stage_id: "claims"
    label: "Claim calibration"
    intent: "Calibrate claims against route-bounded evidence."
  - stage_id: "submission"
    label: "Writing and submission assembly"
    intent: "Assemble writing and submission surfaces."
  - stage_id: "review"
    label: "Review and release QA"
    intent: "Pass through internal review, human review, and release-facing QA."
typed_returns:
  - loop_id: "L1"
    label: "clarification return"
  - loop_id: "L2"
    label: "knowledge return"
  - loop_id: "L3"
    label: "data-resolution return"
  - loop_id: "L4"
    label: "technical repair return"
  - loop_id: "L5"
    label: "bounded redesign return"
  - loop_id: "L6"
    label: "human revision return"
  - loop_id: "L7"
    label: "successor-spawn return"
  - loop_id: "L8"
    label: "post-submission reviewer return"
  - loop_id: "L9"
    label: "stop-to-archive return"
major_crossings:
  - "intake to question"
  - "question to readiness"
  - "readiness to route lock"
  - "route lock to data resolution"
  - "data resolution to build"
  - "build to freeze"
  - "freeze to pilot"
  - "pilot to disposition"
  - "disposition to continue or terminal handling"
  - "analysis to claims"
  - "claims to submission"
  - "submission to review"
  - "review to release-facing output"
sealed_route_summary:
  baseline_core:
    - "W1"
    - "W2"
    - "W3A"
    - "W3B"
    - "W3C-1"
    - "W3C-2"
    - "W3C-3"
    - "W3C-4"
  post_baseline_roll_forward:
    - "P1-S1"
    - "P1-S2"
    - "P2-S1"
    - "P2-S2"
  system_completion_route:
    - "SC-01"
    - "SC-02"
    - "SC-03"
    - "SC-04"
    - "SC-05"
  current_seals:
    - "research_cross_layer_reconciliation_pass_v7"
    - "current_theory_conformance_reratification"
interpretation_rule:
  - "public-safe route skeleton"
  - "not a full local runtime graph"
  - "not a publication of every local coordinate implementation detail"
